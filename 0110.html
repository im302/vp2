<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0110 · 数英日</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f5fc; padding: 24px 16px; display: flex; justify-content: center; }
        .card { max-width: 600px; width: 100%; background: #ffffff; border-radius: 28px; padding: 28px 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.06); }
        h1 { font-size: 24px; color: #0b1e33; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .code-badge { font-size: 14px; color: #3a6290; background: #e5edf9; padding: 2px 14px; border-radius: 40px; font-weight: 400; }
        .sub { color: #3a6290; margin-bottom: 20px; font-size: 14px; border-bottom: 1px solid #eaf0f8; padding-bottom: 12px; }
        .row { display: flex; border-bottom: 1px solid #eef3fa; padding: 10px 0; align-items: center; }
        .row:last-child { border-bottom: none; }
        .time { width: 110px; font-weight: 600; color: #1a3d64; font-size: 14px; flex-shrink: 0; }
        .act { flex: 1; font-size: 14px; color: #1f2e46; }
        .back { display: inline-block; margin-top: 20px; color: #1a4a7a; text-decoration: none; font-weight: 500; }
        .back:hover { text-decoration: underline; }
        .tag { font-size: 11px; padding: 2px 12px; border-radius: 40px; }
        .tag-math { background: #f0d8d8; color: #8a2a2a; }
        .tag-eng { background: #d4d4f0; color: #3a3a8a; }
        .overlap { background: #fff8e8; border-radius: 8px; padding: 4px 12px; font-size: 13px; color: #8a6a2a; }
    </style>
</head>
<body>
