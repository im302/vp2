<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小升初暑假 · 7月8月日历</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f5fc; padding: 24px 16px 40px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1200px; width: 100%; background: white; border-radius: 36px; padding: 28px 24px 36px; box-shadow: 0 12px 40px rgba(0,20,40,0.06); }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 24px; border-bottom: 2px solid #eaf0f8; padding-bottom: 16px; }
        .header h1 { font-size: 28px; font-weight: 700; color: #0b1e33; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .header h1 small { font-size: 16px; font-weight: 400; color: #2e5a86; background: #e5edf9; padding: 2px 18px; border-radius: 60px; }
        .click-hint { font-size: 13px; color: #3f6d9e; background: #e5effa; padding: 4px 16px; border-radius: 40px; font-weight: 400; }
        .today-badge { background: #1a4a7a; color: white; padding: 8px 20px; border-radius: 60px; font-size: 15px; font-weight: 500; box-shadow: 0 4px 10px rgba(20,60,120,0.15); }
        .calendar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
        @media (max-width:780px){ .calendar-grid { grid-template-columns:1fr; gap:32px; } .container { padding:16px 12px; } .header h1 { font-size:22px; } }
        .month-card { background: #f9fcff; border-radius: 24px; border: 1px solid #e5edf6; padding: 16px 14px 20px; }
        .month-title { font-size: 22px; font-weight: 650; color: #0f2b4a; padding-bottom: 10px; margin-bottom: 12px; border-bottom: 2px dashed #d6e2f2; display: flex; justify-content: space-between; align-items: baseline; }
        .month-title span { font-size: 14px; font-weight: 400; color: #3e6b9e; background: #e3edfa; padding: 2px 14px; border-radius: 40px; }
        .weekday-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 6px; text-align: center; font-weight: 600; font-size: 13px; color: #34577e; }
        .day-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
        .day-cell { aspect-ratio: 1/1; background: white; border-radius: 14px; padding: 4px 2px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: #1d3557; border: 1px solid #eaf1fa; transition: 0.1s; cursor: pointer; min-height: 52px; text-decoration: none; user-select: none; }
        .day-cell:hover { background: #e9f0fa; border-color: #b0ccec; transform: scale(1.02); }
        .day-cell.empty { background: transparent; border: 1px solid transparent; cursor: default; pointer-events: none; }
        .day-cell.empty:hover { background: transparent; transform: none; }
        .day-cell.today { background: #d4e3ff; border-color: #3973c0; box-shadow: 0 0 0 2px #c0d6f5; font-weight: 700; }
        .day-cell.weekend { background: #f4f8ff; border-color: #dae5f5; }
        .day-cell .day-number { font-size: 15px; font-weight: 600; line-height: 1.2; }
        .day-cell .day-label { font-size: 7.5px; font-weight: 600; padding: 1px 6px; border-radius: 30px; margin-top: 1px; white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
        .day-cell .day-label.math { background: #f0d8d8; color: #8a2a2a; }
        .day-cell .day-label.code { background: #d4e8d4; color: #1f6a1f; }
        .day-cell .day-label.english { background: #d4d4f0; color: #3a3a8a; }
        .day-cell .day-label.chinese { background: #d4e2f8; color: #004080; }
        .day-cell .day-label.rest { background: #e6edf8; color: #3a5f88; }
        .day-cell .sub-label { font-size: 6.5px; opacity: 0.75; color: #3a6290; margin-top: 1px; }
        .legend-bar { margin-top: 24px; display: flex; flex-wrap: wrap; gap: 14px 28px; padding-top: 18px; border-top: 1px solid #e2ebf5; font-size: 13px; color: #254b73; }
        .legend-bar span { display: inline-flex; align-items: center; gap: 6px; }
        .legend-bar i { display: inline-block; width: 14px; height: 14px; border-radius: 6px; }
        .footer-note { margin-top: 18px; font-size: 14px; color: #2b5580; background: #ecf3fc; padding: 8px 20px; border-radius: 60px; display: inline-block; }
        @media (max-width:480px){ .day-cell { min-height:44px; padding:2px 1px; border-radius:10px; } .day-cell .day-number { font-size:13px; } .day-cell .day-label { font-size:6px; padding:1px 3px; } .day-cell .sub-label { font-size:5.5px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🗓️ 暑假日历 <small>小升初 · 2026</small> <span class="click-hint">📌 点击跳转 → 编码.html</span></h1>
        <div class="today-badge" id="todayBadge">📅 今天</div>
    </div>
    <div class="calendar-grid">
        <div class="month-card"><div class="month-title">7月 <span>2026</span></div><div class="weekday-row"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div><div class="day-grid" id="julyGrid"></div></div>
        <div class="month-card"><div class="month-title">8月 <span>2026</span></div><div class="weekday-row"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div><div class="day-grid" id="augustGrid"></div></div>
    </div>
    <div class="legend-bar">
        <span><i style="background:#d4e3ff;"></i> 今天</span>
        <span><i style="background:#f0d8d8;"></i> 数学课</span>
        <span><i style="background:#d4e8d4;"></i> 编程课</span>
        <span><i style="background:#d4d4f0;"></i> 英语课</span>
        <span><i style="background:#d4e2f8;"></i> 语文课</span>
        <span style="background:#eef3fc; padding:2px 14px; border-radius:40px;">🔗 编码.html → 日程详情</span>
    </div>
    <div style="text-align:center; margin-top:12px;">
        <span class="footer-note">🧮 数学 8/15-18 &nbsp;|&nbsp; 💻 编程 周日 (除8/16,8/23) + 7/29,8/5 &nbsp;|&nbsp; 🇬🇧 英语 每周日 + 7/23,7/30</span>
    </div>
</div>

<script>
    (function() {
        const YEAR = 2026;

        // ===== 课程配置 =====
        const mathDays = ['2026-08-15', '2026-08-16', '2026-08-17', '2026-08-18'];
        const codeDays = [
            '2026-07-05', '2026-07-12', '2026-07-19', '2026-07-26',
            '2026-07-29',
            '2026-08-02', '2026-08-05', '2026-08-09', '2026-08-30'
        ];
        const codeDaysFinal = codeDays.filter(d => d !== '2026-08-16' && d !== '2026-08-23');
        const englishDays = [
            '2026-07-05', '2026-07-12', '2026-07-19', '2026-07-23',
            '2026-07-26', '2026-07-30',
            '2026-08-02', '2026-08-09', '2026-08-16', '2026-08-23', '2026-08-30'
        ];

        function getCode(dateStr) {
            let code = 0;
            const d = new Date(dateStr);
            const dayOfWeek = d.getDay();
            const isWeekday = (dayOfWeek >= 1 && dayOfWeek <= 5);
            if (isWeekday) code += 8;
            if (mathDays.includes(dateStr)) code += 4;
            if (englishDays.includes(dateStr)) code += 2;
            if (codeDaysFinal.includes(dateStr)) code += 1;
            return code;
        }

        function getLink(month, day) {
            const code = getCode(`${YEAR}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`);
            const codeStr = code.toString(2).padStart(4, '0');
            return `plan/${codeStr}.html`;
        }

        function renderMonth(year, month, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            let startOffset = firstDay.getDay() - 1;
            if (startOffset === -1) startOffset = 6;
            let html = '';
            for (let i = 0; i < startOffset; i++) {
                html += `<div class="day-cell empty"></div>`;
            }
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dayOfWeek = dateObj.getDay();
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = (dateStr === todayStr);

                const code = getCode(dateStr);
                const codeStr = code.toString(2).padStart(4, '0');

                let labels = [];
                let subLabels = [];

                if (code & 8) { labels.push({ text: '📚 语文', cls: 'chinese' }); }
                if (code & 4) { labels.push({ text: '🧮 数学', cls: 'math' }); subLabels.push('18:00'); }
                if (code & 2) { labels.push({ text: '🇬🇧 英语', cls: 'english' }); subLabels.push('18:30'); }
                if (code & 1) { labels.push({ text: '💻 编程', cls: 'code' }); subLabels.push('10:00'); }

                if (labels.length === 0) {
                    if (isWeekend) {
                        labels.push({ text: '☀️ 自由', cls: 'rest' });
                    } else {
                        labels.push({ text: '📚 语文', cls: 'chinese' });
                    }
                }

                let classes = 'day-cell';
                if (isWeekend) classes += ' weekend';
                if (isToday) classes += ' today';

                const link = getLink(month, d);
                let labelHtml = labels.map(l => `<div class="day-label ${l.cls}">${l.text}</div>`).join('');
                let subHtml = subLabels.length > 0 ? `<div class="sub-label">${subLabels.join(' ')}</div>` : '';

                html += `<a href="${link}" class="${classes}" style="text-decoration:none; color:inherit; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                            <div class="day-number">${d}</div>
                            ${labelHtml}
                            ${subHtml}
                        </a>`;
            }
            container.innerHTML = html;
        }

        renderMonth(YEAR, 6, 'julyGrid');
        renderMonth(YEAR, 7, 'augustGrid');

        const now = new Date();
        const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        const weekdays = ['周一','周二','周三','周四','周五','周六','周日'];
        const wd = weekdays[now.getDay() === 0 ? 6 : now.getDay() - 1];
        const code = getCode(dateStr);
        const codeStr = code.toString(2).padStart(4, '0');
        document.getElementById('todayBadge').textContent = `📅 ${dateStr} ${wd} 编码: ${codeStr}`;
    })();
</script>
</body>
</html>
