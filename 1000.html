<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1000 · 语文日</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f5fc; padding: 24px 16px; display: flex; justify-content: center; }
        .card { max-width: 600px; width: 100%; background: #ffffff; border-radius: 28px; padding: 28px 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.06); }
        h1 { font-size: 24px; color: #0b1e33; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .code-badge { font-size: 14px; color: #3a6290; background: #e5edf9; padding: 2px 14px; border-radius: 40px; font-weight: 400; }
        .sub { color: #3a6290; margin-bottom: 20px; font-size: 14px; border-bottom: 1px solid #eaf0f8; padding-bottom: 12px; }
        .row { display: flex; border-bottom: 1px solid #eef3fa; padding: 10px 0; align-items: center; }
        .row:last-child { border-bottom: none; }
        .time { width: 110px; font-weight: 600; color: #1a3d64; font-size: 14px; flex-shrink: 0; }
        .act { flex: 1; font-size: 14px; color: #1f2e46; }
        .back { display: inline-block; margin-top: 20px; color: #1a4a7a; text-decoration: none; font-weight: 500; }
        .back:hover { text-decoration: underline; }
        .tag { font-size: 11px; padding: 2px 12px; border-radius: 40px; background: #d4e2f8; color: #004080; }
    </style>
</head>
<body>
<div class="card">
    <h1>📚 语文日 <span class="code-badge">1000</span></h1>
    <div class="sub">📅 仅语文课 · 08:30-12:00</div>
    <div class="row"><span class="time">07:30-08:00</span><span class="act">起床 &amp; 早餐</span></div>
    <div class="row"><span class="time">08:00-08:20</span><span class="act">📖 晨读 / 预习</span></div>
    <div class="row"><span class="time">08:30-12:00</span><span class="act"><span class="tag">📚 语文课</span></span></div>
    <div class="row"><span class="time">12:00-12:30</span><span class="act">午餐</span></div>
    <div class="row"><span class="time">12:30-13:10</span><span class="act">😴 午睡</span></div>
    <div class="row"><span class="time">13:10-14:00</span><span class="act">自由休息</span></div>
    <div class="row"><span class="time">14:00-16:00</span><span class="act">🎮 游戏时间</span></div>
    <div class="row"><span class="time">16:00-17:30</span><span class="act">📝 暑假作业</span></div>
    <div class="row"><span class="time">17:30-18:00</span><span class="act">✍️ 字帖</span></div>
    <div class="row"><span class="time">18:00-19:00</span><span class="act">晚餐 &amp; 自由</span></div>
    <div class="row"><span class="time">19:00-21:30</span><span class="act">📖 机动 / 补作业 / 阅读</span></div>
    <div class="row"><span class="time">21:30-22:30</span><span class="act">洗漱 &amp; 准备睡</span></div>
    <div class="row"><span class="time">22:30</span><span class="act">💤 熄灯睡觉</span></div>
    <a href="../calendar.html" class="back">← 返回日历</a>
</div>
</body>
</html>
